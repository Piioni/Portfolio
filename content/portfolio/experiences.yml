items:
  - id: wegow-music
    company: Wegow Music
    role: Multiplatform Engineering Intern
    startDate: 2025-05
    endDate: 2025-06
    description: Migrated a legacy Android application written in Kotlin to a modern multiplatform solution using Kotlin Multiplatform and Compose. I shared business logic across platforms to improve maintainability and reduce duplication, while reusing UI with Compose where it provided clear value. I also reworked the architecture to separate responsibilities and modularize the project, making it easier to evolve, maintain, and scale. In addition, I resolved platform-specific differences in critical flows such as navigation, state, and persistence, adapting the solution to each environment's needs.
    highlights:
      - Shared business logic across platforms with Kotlin Multiplatform to reduce duplication and simplify maintenance.
      - Reused UI with Compose where it made sense, keeping the user experience consistent.
      - Reorganized the architecture into clearer modules and boundaries to improve scalability and long-term maintainability.
    technologies:
      - id: kotlin-multiplatform
        label: Kotlin Multiplatform
      - id: kotlin-compose
        label: Kotlin Compose
      - id: ios
        label: iOS

  - id: pegasus-medical
    company: Pegasus Medical
    role: Intern Software Developer
    startDate: 2025-04
    endDate: 2025-06
    description: Designed and developed a PHP/MySQL web application for centralized tracking of medical supplies across multiple hospitals. Implemented a secure role-based access control system, enabling administrators and staff to view/update inventory based on permissions.
    highlights:
      - Followed MVC (Model-View-Controller) architecture for clean, scalable, and maintainable code.
      - Containerized the PHP application and database using Docker, ensuring consistent deployment and development environments.
    technologies:
      - id: php
        label: Php
      - id: docker
        label: Docker
      - id: mysql
        label: MySql
      - id: html
        label: Html
      - id: css
        label: Css
      - id: javascript
        label: Javascript
